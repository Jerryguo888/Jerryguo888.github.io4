<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Web Programming Exercise</title>
    <style>
        body {
            font-family: serif;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input[type="text"] {
            display: block;
            margin-top: 5px;
        }
        .button-group {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <form>
        <div class="form-group">
            <label for="firstName">First name:</label>
            <input type="text" id="firstName" name="firstName" value="家睿">
        </div>

        <div class="form-group">
            <label for="lastName">Last name:</label>
            <input type="text" id="lastName" name="lastName" value="郭">
        </div>

        <div class="form-group">
            <label for="studentID">Student ID:</label>
            <input type="text" id="studentID" name="studentID" value="113403549">
        </div>

        <div class="button-group">
            <input type="submit" value="Submit">
            <input type="reset" value="重設">
        </div>
    </form>

</body>
</html>
